name: CI Failure → Open Issue

on:
  workflow_run:
    workflows: ['Backend CI', 'Frontend CI']
    types:
      - completed

jobs:
  open-issue:
    name: Open Issue on CI Failure
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    permissions:
      issues: write
      actions: read
    steps:
      - name: Get PR information
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;

            // Get associated PRs from the workflow run
            const prs = run.pull_requests;
            if (!prs || prs.length === 0) {
              core.setOutput('skip', 'true');
              core.info('No associated PR found, skipping');
              return;
            }

            const pr = prs[0];
            core.setOutput('skip', 'false');
            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_url', pr.url);
            core.setOutput('branch', run.head_branch);
            core.setOutput('commit_sha', run.head_sha.substring(0, 7));
            core.setOutput('workflow_name', run.name);
            core.setOutput('run_id', run.id);
            core.setOutput('run_url', run.html_url);

      - name: Get failed jobs
        if: steps.pr-info.outputs.skip != 'true'
        id: failed-jobs
        uses: actions/github-script@v7
        with:
          script: |
            const runId = ${{ steps.pr-info.outputs.run_id }};
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              filter: 'latest',
            });

            const failed = jobs.data.jobs
              .filter(job => job.conclusion === 'failure')
              .map(job => `- **${job.name}** — [Log](${job.html_url})`)
              .join('\n');

            core.setOutput('list', failed || '- (job details unavailable)');

      - name: Check for duplicate issue
        if: steps.pr-info.outputs.skip != 'true'
        id: dedup
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.pr-info.outputs.pr_number }}';
            const workflowName = '${{ steps.pr-info.outputs.workflow_name }}';
            const searchTitle = `CI Failure: ${workflowName} — PR #${prNumber}`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-failure',
              state: 'open',
              per_page: 100,
            });

            const duplicate = issues.data.find(issue => issue.title === searchTitle);

            if (duplicate) {
              core.setOutput('exists', 'true');
              core.setOutput('issue_number', duplicate.number);
              core.info(`Duplicate issue found: #${duplicate.number}`);
            } else {
              core.setOutput('exists', 'false');
            }

      - name: Ensure labels exist
        if: steps.pr-info.outputs.skip != 'true' && steps.dedup.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "ci-failure" --color "D93F0B" --description "Automated: CI pipeline failure" --repo "${{ github.repository }}" 2>/dev/null || true
          gh label create "automated" --color "0E8A16" --description "Created by automation" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Create issue
        if: steps.pr-info.outputs.skip != 'true' && steps.dedup.outputs.exists != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.pr-info.outputs.pr_number }}';
            const workflowName = '${{ steps.pr-info.outputs.workflow_name }}';
            const branch = '${{ steps.pr-info.outputs.branch }}';
            const commitSha = '${{ steps.pr-info.outputs.commit_sha }}';
            const runUrl = '${{ steps.pr-info.outputs.run_url }}';
            const failedJobs = `${{ steps.failed-jobs.outputs.list }}`;

            const title = `CI Failure: ${workflowName} — PR #${prNumber}`;
            const body = [
              `## CI Pipeline Failure`,
              ``,
              `| Detail | Value |`,
              `|--------|-------|`,
              `| **Workflow** | ${workflowName} |`,
              `| **PR** | #${prNumber} |`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | \`${commitSha}\` |`,
              `| **Run Log** | [View workflow run](${runUrl}) |`,
              ``,
              `### Failed Jobs`,
              ``,
              failedJobs,
              ``,
              `---`,
              `*This issue was created automatically by CI.*`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-failure', 'automated'],
            });

            core.info(`Issue created: ${title}`);

      - name: Comment on existing issue
        if: steps.pr-info.outputs.skip != 'true' && steps.dedup.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.dedup.outputs.issue_number || 0 }};
            const runUrl = '${{ steps.pr-info.outputs.run_url }}';
            const commitSha = '${{ steps.pr-info.outputs.commit_sha }}';
            const failedJobs = `${{ steps.failed-jobs.outputs.list }}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: [
                `### CI still failing`,
                ``,
                `**Commit:** \`${commitSha}\` — [Run log](${runUrl})`,
                ``,
                failedJobs,
              ].join('\n'),
            });

            core.info(`Comment added to issue #${issueNumber}`);
